<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>MeetMinutes — enable microphone</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0; min-height: 100vh; display: flex; align-items: center;
        justify-content: center; background: #0f1117; color: #f3f4f6;
        font: 15px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      .card {
        max-width: 380px; padding: 28px 26px; text-align: center;
        background: #161922; border: 1px solid rgba(255,255,255,.08);
        border-radius: 14px;
      }
      h1 { font-size: 18px; margin: 0 0 8px; }
      p { color: #c2c7d0; margin: 0 0 18px; }
      button {
        font: inherit; font-weight: 600; cursor: pointer;
        padding: 11px 22px; border-radius: 8px; border: 0;
        background: #4f7cff; color: #fff;
      }
      button:disabled { opacity: .6; cursor: default; }
      .status { margin-top: 14px; font-size: 13px; min-height: 18px; }
      .ok { color: #34d399; } .err { color: #f87171; }
    </style>
  </head>
  <body>
    <!--
      A TOP-LEVEL extension page (opened by the service worker in its
      own window) — NOT an iframe in the meeting tab. getUserMedia()
      fails in the offscreen document / popup / a cross-origin iframe
      (the meeting page's Permissions-Policy blocks the latter). Only a
      top-level extension-origin document can prompt; once granted,
      Chrome PERSISTS it for the extension origin so the offscreen
      document's getUserMedia({audio:true}) then succeeds. The button
      guarantees the user-gesture getUserMedia wants.
    -->
    <div class="card">
      <h1>Enable microphone</h1>
      <p>MeetMinutes needs microphone access to record your voice in
         meetings. You only have to do this once.</p>
      <button id="allow" type="button">Allow microphone</button>
      <div id="status" class="status" role="status" aria-live="polite"></div>
    </div>
    <script type="module" src="./mic.js"></script>
  </body>
</html>
